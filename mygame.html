<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나의 첫 인터넷 클릭커 게임!</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        h1 { color: #f9e2af; margin-bottom: 10px; }
        .score { font-size: 2rem; margin-bottom: 20px; }
        .coin {
            font-size: 6rem;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .coin:hover {
            transform: scale(1.1);
        }
        .coin:active {
            transform: scale(0.9);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 30px;
            z-index: 10;
        }
        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: #a6e3a1;
            color: #11111b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:disabled {
            background-color: #585b70;
            color: #a6adc8;
            cursor: not-allowed;
        }
        /* [추가] 초기화 버튼 스타일 */
        .reset-btn {
            background-color: #f38ba8;
            color: #11111b;
            font-size: 0.8rem;
            padding: 6px 12px;
            align-self: center;
        }

        /* 둥둥 떠오르는 +1 글자 스타일 */
        .floating-text {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f9e2af;
            pointer-events: none;
            user-select: none;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-80px);
                opacity: 0;
            }
        }

        /* 화면 오른쪽 위 음악 버튼 스타일 */
        .bgm-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #313244;
            color: #cdd6f4;
            border: 2px solid #45475a;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            z-index: 100;
        }
        .bgm-btn:hover {
            background-color: #45475a;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <button class="bgm-btn" id="bgm-toggle">
        <span id="bgm-icon">🔇</span> 음악 꺼짐
    </button>

    <h1>골드 클릭커 🪙</h1>
    <div class="score">골드: <span id="gold">0</span></div>
    
    <div class="coin" id="coin">🪙</div>
    
    <!-- 초기화 버튼 추가를 위해 버튼 그룹으로 감쌈 -->
    <div class="btn-group">
        <button class="btn" id="upgrade-btn" disabled>자동 광부 고용 (비용: 10 골드)</button>
        <button class="btn reset-btn" id="reset-btn">게임 초기화 🔄</button>
    </div>

    <script>
        // 기본값 설정
        let gold = 0;
        let autoMiners = 0;
        let upgradeCost = 10;

        const goldEl = document.getElementById('gold');
        const coinEl = document.getElementById('coin');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const resetBtn = document.getElementById('reset-btn');
        const bgmToggleBtn = document.getElementById('bgm-toggle');
        const bgmIconEl = document.getElementById('bgm-icon');

        // 소리 파일
        const clickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2019/2019-84.wav');
        const bgm = new Audio('https://soundimage.org/wp-content/uploads/2016/10/Arcade-Fantasy.mp3');
        bgm.loop = true;
        bgm.volume = 0.4;

        let isMusicPlaying = false;

        // [추가/수정] 1. 페이지 로드 시 저장된 데이터 불러오기 (Load)
        function loadGame() {
            const savedGold = localStorage.getItem('clicker_gold');
            const savedMiners = localStorage.getItem('clicker_miners');
            const savedCost = localStorage.getItem('clicker_cost');

            if (savedGold !== null) gold = parseInt(savedGold);
            if (savedMiners !== null) autoMiners = parseInt(savedMiners);
            if (savedCost !== null) upgradeCost = parseInt(savedCost);

            updateDisplay();
        }

        // [추가] 2. 현재 상태를 브라우저에 실시간 저장하기 (Save)
        function saveGame() {
            localStorage.setItem('clicker_gold', gold);
            localStorage.setItem('clicker_miners', autoMiners);
            localStorage.setItem('clicker_cost', upgradeCost);
        }

        // BGM 조작 함수
        function toggleBGM() {
            if (isMusicPlaying) {
                bgm.pause();
                bgmIconEl.textContent = '🔇';
                bgmToggleBtn.innerHTML = '<span id="bgm-icon">🔇</span> 음악 꺼짐';
                isMusicPlaying = false;
            } else {
                bgm.play().then(() => {
                    bgmIconEl.textContent = '🔊';
                    bgmToggleBtn.innerHTML = '<span id="bgm-icon">🔊</span> 음악 켜짐';
                    isMusicPlaying = true;
                }).catch(() => {
                    console.log("클릭 후 음악이 재생됩니다.");
                });
            }
        }

        bgmToggleBtn.addEventListener('click', () => {
            toggleBGM();
        });

        // 동전을 클릭했을 때 일어나는 일
        coinEl.addEventListener('click', (event) => {
            gold++;
            
            clickSound.currentTime = 0;
            clickSound.play();
            
            createFloatingText(event.clientX, event.clientY);
            
            if (!isMusicPlaying) {
                toggleBGM();
            }
            
            saveGame(); // [추가] 돈 벌 때마다 자동 저장!
            updateDisplay();
        });

        // 둥둥 뜨는 텍스트 만들기
        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.classList.add('floating-text');
            text.textContent = '+1';
            text.style.left = `${x - 15}px`;
            text.style.top = `${y - 15}px`;
            document.body.appendChild(text);
            
            setTimeout(() => {
                text.remove();
            }, 800);
        }

        // 광부 업그레이드 버튼을 클릭했을 때 일어나는 일
        upgradeBtn.addEventListener('click', () => {
            if (gold >= upgradeCost) {
                gold -= upgradeCost;
                autoMiners++;
                upgradeCost = Math.floor(upgradeCost * 1.5);
                
                saveGame(); // [추가] 업그레이드할 때도 자동 저장!
                updateDisplay();
            }
        });

        // [추가] 3. 처음부터 다시 하고 싶을 때 사용할 초기화 버튼 기능
        resetBtn.addEventListener('click', () => {
            if (confirm("정말로 모든 데이터를 지우고 처음부터 다시 시작하시겠습니까?")) {
                localStorage.clear(); // 브라우저 저장소 비우기
                gold = 0;
                autoMiners = 0;
                upgradeCost = 10;
                updateDisplay();
                alert("초기화되었습니다!");
            }
        });

        // 1초마다 자동으로 돈을 벌어다 주는 기능
        setInterval(() => {
            if (autoMiners > 0) {
                gold += autoMiners;
                saveGame(); // [추가] 초당 자동으로 돈 벌 때도 실시간 저장!
                updateDisplay();
            }
        }, 1000);

        function updateDisplay() {
            goldEl.textContent = gold;
            upgradeBtn.textContent = `자동 광부 고용 (비용: ${upgradeCost} 골드) | 현재 광부: ${autoMiners}명`;
            upgradeBtn.disabled = gold < upgradeCost;
        }

        // [추가] 게임을 켜자마자 데이터를 읽어오도록 실행!
        loadGame();
    </script>
</body>
</html>
